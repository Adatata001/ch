<!DOCTYPE html>
<html>
<head>
    <title>Bybit Deposit Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 760px;
            color: #1f2937;
        }

        label {
            display: block;
            margin-top: 16px;
            font-weight: 700;
        }

        input {
            box-sizing: border-box;
            display: block;
            margin-top: 6px;
            padding: 10px;
            width: 100%;
        }

        button {
            margin-top: 16px;
            margin-right: 8px;
            padding: 10px 14px;
            cursor: pointer;
        }

        pre {
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            padding: 16px;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <h2>Bybit Deposit Monitor</h2>

    <label for="coin">Coin</label>
    <input id="coin" value="USDT" placeholder="USDT">

    <label for="chain">Chain type</label>
    <input id="chain" value="ETH" placeholder="ETH, TRX, SOL...">

    <label for="address">Training target address</label>
    <input id="address" placeholder="Paste the address your detector should see">

    <label for="amount">Training amount</label>
    <input id="amount" type="number" min="0" step="0.000001" placeholder="100">

    <button onclick="getAddress()">Get Deposit Address</button>
    <button onclick="getRecords()">Check Deposit Records</button>
    <button onclick="injectTrainingDeposit()">Create Training Event</button>
    <button onclick="getTrainingDeposits()">Show Training Events</button>

    <pre id="output">Choose an action.</pre>

    <script>
        const output = document.getElementById('output');

        function coin() {
            return encodeURIComponent(document.getElementById('coin').value || 'USDT');
        }

        function chain() {
            return encodeURIComponent(document.getElementById('chain').value || '');
        }

        function rawValue(id) {
            return document.getElementById(id).value;
        }

        async function showResponse(response) {
            const text = await response.text();
            try {
                output.textContent = JSON.stringify(JSON.parse(text), null, 2);
            } catch {
                output.textContent = text;
            }
        }

        async function getAddress() {
            output.textContent = 'Loading deposit address...';
            const response = await fetch(`/deposit-address?coin=${coin()}&chainType=${chain()}`);
            showResponse(response);
        }

        async function getRecords() {
            output.textContent = 'Loading deposit records...';
            const response = await fetch(`/deposit-records?coin=${coin()}&limit=10`);
            showResponse(response);
        }

        async function injectTrainingDeposit() {
            output.textContent = 'Creating training event...';
            const response = await fetch('/training/inject-deposit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    coin: rawValue('coin') || 'USDT',
                    chain: rawValue('chain') || 'ETH',
                    address: rawValue('address'),
                    amount: rawValue('amount')
                })
            });
            showResponse(response);
        }

        async function getTrainingDeposits() {
            output.textContent = 'Loading training events...';
            const response = await fetch('/training/deposits');
            showResponse(response);
        }
    </script>
</body>
</html>
